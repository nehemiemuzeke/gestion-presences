<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur serveur - Gestion des Présences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-red-900 via-red-800 to-orange-900 
             min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <div class="text-9xl font-black text-white opacity-20 mb-4">500</div>
        <div class="w-24 h-24 bg-white bg-opacity-10 rounded-full 
                    flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-white text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-white mb-3">
            Erreur serveur
        </h1>
        <p class="text-red-200 mb-8 max-w-md mx-auto">
            Une erreur interne s'est produite. 
            Notre équipe a été notifiée.
        </p>
        <a href="/"
           class="inline-flex items-center gap-2 px-6 py-3 bg-white 
                  text-red-900 font-semibold rounded-xl 
                  hover:bg-red-50 transition-colors">
            <i class="fas fa-home"></i>
            Retour à l'accueil
        </a>
    </div>

</html>
