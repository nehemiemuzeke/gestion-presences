{% extends 'dashboard/layout_admin.html' %}

{% block page_title %}En construction{% endblock %}

{% block admin_content %}
<div class="flex items-center justify-center h-96">
    <div class="text-center">
        <div class="w-24 h-24 bg-blue-100 rounded-full 
                    flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-tools text-blue-500 text-4xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">En cours de construction</h2>
        <p class="text-gray-500 mb-6">
            Cette page sera disponible dans les prochaines étapes du développement.
        </p>
        <a href="{% url 'admin_dashboard' %}" 
           class="btn inline-flex items-center gap-2 px-6 py-3 
                  bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium">
            <i class="fas fa-arrow-left"></i>
            Retour au dashboard
        </a>
    </div>
</div>
{% endblock %}
